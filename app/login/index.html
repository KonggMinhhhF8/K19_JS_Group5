<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f1117;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #fff;
            border: 1px solid #e5e5e0;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 380px;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            color: #111;
            margin-bottom: 28px;
            letter-spacing: -0.4px;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #555;
            margin-bottom: 6px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: #aaa;
            pointer-events: none;
        }

        input {
            width: 100%;
            padding: 10px 12px 10px 38px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: #111;
            outline: none;
            background: #fafafa;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input::placeholder {
            color: #bbb;
        }

        input:focus {
            border-color: #111;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.06);
        }

        .btn {
            width: 100%;
            margin-top: 24px;
            padding: 11px;
            background: #111;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }

        .btn:hover {
            background: #333;
        }

        .btn:active {
            transform: scale(0.98);
        }

        @media (max-width: 440px) {
            .card {
                padding: 36px 24px;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Đăng nhập</h1>

        <div class="field">
            <label for="email">Email</label>
            <div class="input-wrap">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="4" width="20" height="16" rx="2" />
                    <polyline points="2,4 12,13 22,4" />
                </svg>
                <input type="email" id="email" placeholder="nguyenvana@gmail.com" autocomplete="email" />
            </div>
        </div>

        <div class="field">
            <label for="password">Mật khẩu</label>
            <div class="input-wrap">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
            </div>
        </div>

        <button class="btn" type="button">Đăng nhập</button>
    </div>

</body>

</html>
